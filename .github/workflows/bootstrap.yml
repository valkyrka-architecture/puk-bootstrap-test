name: Bootstrap Repository

# Runs automatically on the first push to main (detected via .github/BOOTSTRAP_PENDING).
# Can also be triggered manually for re-runs or debugging.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      template_repo:
        description: 'Source template (owner/repo) — required when running manually'
        required: false
        default: ''
      force:
        description: 'Run even if BOOTSTRAP_PENDING marker is absent'
        type: boolean
        default: false

jobs:
  bootstrap:
    name: Copy variables from template
    runs-on: ubuntu-latest
    # Never run on the template repository itself
    if: github.event.repository.is_template == false
    permissions:
      contents: write
      deployments: write
    env:
      GH_TOKEN: ${{ secrets.REPOSITORY_GITHUB_BOOTSTRAP }}
      TARGET_REPO: ${{ github.repository }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve template repository
        env:
          # Use the built-in token here — no BOOTSTRAP_TOKEN needed just to read repo metadata
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ inputs.template_repo }}"

          if [[ -z "$REPO" ]]; then
            REPO=$(gh api "/repos/$TARGET_REPO" --jq '.template_repository.full_name // empty' 2>/dev/null || true)
          fi

          if [[ -z "$REPO" ]]; then
            echo "::error::Could not determine the source template. Supply the 'template_repo' input when running manually (e.g. owner/repo)."
            exit 1
          fi

          echo "Template: $REPO"
          echo "Target:   $TARGET_REPO"
          echo "TEMPLATE_REPO=$REPO" >> "$GITHUB_ENV"

      - name: Check whether bootstrap is pending
        id: check
        run: |
          if [[ -f ".github/BOOTSTRAP_PENDING" || "${{ inputs.force }}" == "true" ]]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "Bootstrap already completed — skipping."
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy repository variables
        if: steps.check.outputs.pending == 'true'
        run: |
          echo "==> Copying repository variables: $TEMPLATE_REPO → $TARGET_REPO"

          # Slurp all paginated responses into one compact array — prevents multi-line
          # JSON objects from breaking the while-read loop. ? suppresses null-iteration
          # errors when the API returns an error response or empty body.
          VARS=$(gh api --paginate "/repos/$TEMPLATE_REPO/actions/variables" \
            | jq -sc '[.[]?.variables[]? | {name: .name, value: .value}]' 2>/dev/null || true)

          if [[ -z "$VARS" || "$VARS" == "[]" ]]; then
            echo "No repository variables found in template."
          else
            echo "$VARS" | jq -c '.[]' | while IFS= read -r var; do
              NAME=$(echo "$var" | jq -r '.name')
              VALUE=$(echo "$var" | jq -r '.value')
              echo "  → $NAME"
              gh api --method POST "/repos/$TARGET_REPO/actions/variables" \
                --field name="$NAME" --field value="$VALUE" --silent 2>/dev/null \
              || gh api --method PATCH "/repos/$TARGET_REPO/actions/variables/$NAME" \
                --field name="$NAME" --field value="$VALUE" --silent
            done
          fi

      - name: Copy environment variables
        if: steps.check.outputs.pending == 'true'
        env:
          BUILTIN_TOKEN: ${{ github.token }}
        run: |
          echo "==> Copying environments and variables: $TEMPLATE_REPO → $TARGET_REPO"

          ENVS=$(gh api --paginate "/repos/$TEMPLATE_REPO/environments" \
            | jq -rsc '[.[]?.environments[]?.name] | .[]' 2>/dev/null || true)

          if [[ -z "$ENVS" ]]; then
            echo "No environments found in template."
          else
            while IFS= read -r ENV_NAME; do
              [[ -z "$ENV_NAME" ]] && continue
              echo "  Environment: $ENV_NAME"

              # Use the built-in token here — the workflow runs inside the target repo
              # so it has native write access without needing the PAT
              GH_TOKEN="$BUILTIN_TOKEN" gh api --method PUT "/repos/$TARGET_REPO/environments/$ENV_NAME" --silent \
                || { echo "    Warning: could not create environment $ENV_NAME"; continue; }

              ENV_VARS=$(gh api --paginate \
                "/repos/$TEMPLATE_REPO/environments/$ENV_NAME/variables" \
                | jq -sc '[.[]?.variables[]? | {name: .name, value: .value}]' 2>/dev/null || true)

              if [[ -z "$ENV_VARS" || "$ENV_VARS" == "[]" ]]; then
                echo "    No variables."
              else
                echo "$ENV_VARS" | jq -c '.[]' | while IFS= read -r var; do
                  NAME=$(echo "$var" | jq -r '.name')
                  VALUE=$(echo "$var" | jq -r '.value')
                  echo "    → $NAME"
                  gh api --method POST \
                    "/repos/$TARGET_REPO/environments/$ENV_NAME/variables" \
                    --field name="$NAME" --field value="$VALUE" --silent 2>/dev/null \
                  || gh api --method PATCH \
                    "/repos/$TARGET_REPO/environments/$ENV_NAME/variables/$NAME" \
                    --field name="$NAME" --field value="$VALUE" --silent
                done
              fi
            done <<< "$ENVS"
          fi

      - name: Mark bootstrap complete
        if: steps.check.outputs.pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f .github/BOOTSTRAP_PENDING
          git add .github/BOOTSTRAP_PENDING
          git commit -m "chore: complete repository bootstrap"
          git push
